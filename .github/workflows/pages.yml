name: Publish documentation

on:
  push:
    branches:
      - devel-2.0
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: doc/rst/requirements.txt

      - name: Install Python documentation dependencies
        run: python -m pip install -r doc/rst/requirements.txt

      - name: Install PDF documentation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            latexmk \
            texlive-fonts-recommended \
            texlive-latex-extra \
            texlive-latex-recommended

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DBLEND_BUILD_DOCS=ON \
            -DBLEND_BUILD_EXAMPLES=OFF \
            -DBLEND_BUILD_TESTS=OFF \
            -DSPHINX_BUILD_EXECUTABLE="$(command -v sphinx-build)"

      - name: Build HTML and PDF documentation
        run: cmake --build build --target docs

      - name: Disable Jekyll processing
        run: touch build/doc/html/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/doc/html

  deploy:
    name: Deploy documentation
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
